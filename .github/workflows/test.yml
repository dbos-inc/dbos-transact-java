name: Test

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        jdk-version: ['17', '21', '25']
        jdk-distro: ['graalvm', 'microsoft', 'oracle', 'temurin' ]
        exclude:
          - jdk-distro: graalvm
            jdk-version: 17
        include:
          - jdk-distro: graalvm
            jdk-version: 17.0.12

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # fetch-depth 0 needed for version calculation

      - name: Set up JDK ${{ matrix.jdk-distro }} ${{ matrix.jdk-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.jdk-version }}
          distribution: ${{ matrix.jdk-distro }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests
        run: ./gradlew clean build
        env:
          PGPASSWORD: dbos
          JDKVERSION: ${{ matrix.jdk-version }}
          SCALE_TEST: "true"

      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: "transact/build/test-results/test/TEST-*.xml"
          show: "fail, skip"
        if: always()

      - name: Upload JDK ${{ matrix.jdk-distro }} ${{ matrix.jdk-version }} test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.jdk-version }}-${{ matrix.jdk-distro }}
          path: |
            transact/build/reports/tests/
            transact/build/test-results/
