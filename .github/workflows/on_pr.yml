name: On Pull Request

on:
  pull_request:
    branches:
      - main
      - release/*
    types:
      - ready_for_review
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ./.github/workflows/test.yml
  test-crdb:
    uses: ./.github/workflows/test_crdb.yml
  test-demo-apps:
    uses: ./.github/workflows/test_demo_apps.yml