name: Test (CockroachDB)

on:
  workflow_call:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # fetch-depth 0 needed for version calculation

      - name: Set up JDK temurin 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests
        run: ./gradlew clean build
        env:
          PGPASSWORD: dbos
          JDKVERSION: '17'
          DBOS_TEST_USE_COCKROACH_DB: 'true'

      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: "transact/build/test-results/test/TEST-*.xml"
          show: "fail, skip"
        if: always()

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-crdb-temurin-17
          path: |
            transact/build/reports/tests/
            transact/build/test-results/
